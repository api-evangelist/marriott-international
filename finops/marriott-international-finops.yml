specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Marriott International
providerId: marriott-international
publisherName: Marriott International, Inc.
serviceCategory: Hospitality Distribution API
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Hospitality
  - Hotels
  - Travel
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps shape for Marriott International: distribution / connectivity API
  consumed under partner agreements. Cost is realized at the booking level (commission per stay) rather
  than at the per-API-call level, so meters track look-to-book efficiency alongside booking volume.'
notes: |
  No public per-API-call pricing exists. The economic unit for Marriott distribution is the booked / stayed
  reservation; API call volume is governed by partner contract rather than directly billed.
sources:
  - https://developer.marriott.com/
  - https://www.marriott.com/marriott/aboutmarriott.mi
principles:
  - name: Visibility
    description: Reconcile partner production metrics (shopping calls, bookings created, stayed nights)
      against the partner's monthly / quarterly distribution invoice. Monitor the look-to-book ratio
      surfaced in the developer portal.
  - name: Allocation
    description: Allocate distribution cost by channel (leisure OTA, corporate, GDS, loyalty), brand,
      and geographic market. Tag external transaction IDs with internal channel / campaign identifiers
      at booking time to support chargeback to product or marketing teams.
  - name: Optimization
    description: Reduce wasted shopping traffic via cache and short-TTL availability storage, defer
      non-revenue-impacting modify calls, and consolidate connections through a single distribution
      gateway where commercially viable.
  - name: Accountability
    description: Assign a connectivity owner who reviews look-to-book ratios, dispute volume, and commission
      reconciliation each month with Marriott's distribution team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Rate Optimization
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - Invoicing and Chargeback
      - Onboarding Workloads
billingModel:
  pricingCategory: Partner Commission (Per-Booking / Per-Stayed-Night)
  billingFrequency: Monthly
  billingCurrency: USD (settlement varies)
  chargeCategories:
    - Usage
    - Adjustment
    - Credit
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Marriott Developer API
  ServiceCategory: Hospitality Distribution
  ProviderName: Marriott International
  PublisherName: Marriott International, Inc.
  InvoiceIssuerName: Marriott International, Inc.
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: shopping_requests
    description: Availability / shopping requests submitted by the partner.
    unit: request
    aggregation: sum
    dimensions:
      - partner
      - brand
      - market
      - channel
  - name: bookings_created
    description: Reservations successfully created via the API.
    unit: booking
    aggregation: sum
    dimensions:
      - partner
      - brand
      - property
      - channel
  - name: stayed_nights
    description: Nights actually stayed (post-arrival), the unit on which most distribution commission
      is settled.
    unit: room-night
    aggregation: sum
    dimensions:
      - partner
      - brand
      - property
      - rate_plan
  - name: commission_settled
    description: Commission paid by Marriott to the distribution partner (or vice versa, per contract).
    unit: USD
    aggregation: sum
    dimensions:
      - partner
      - brand
      - market
apis:
  - name: Marriott Developer API
    baseURL: https://devportalprod.marriott.com
    tags:
      - Hospitality
      - Hotels
      - Reservations
      - Travel
    serviceName: Marriott Developer API
    serviceCategory: API
unitEconomics:
  - name: Look-to-Book Ratio
    metric: shopping_requests / bookings_created
    target: contractual ceiling
  - name: Commission per Stayed Night
    metric: commission_settled / stayed_nights
    target: TBD
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
