specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Marriott International
providerId: marriott-international
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Hospitality
  - Hotels
  - Travel
  - Reservations
description: Marriott International operates a private developer portal (devportalprod.marriott.com) for
  approved partners — primarily online travel agencies, GDS connectors, corporate booking tools, loyalty
  partners, and franchisees. There is no public, self-serve pricing for the Marriott Developer API. Access
  is granted under bilateral commercial agreements (distribution / connectivity contracts) and pricing
  is settled via reservation-level commission rather than per-API-call.
notes: |
  No public pricing page; the Marriott developer portal requires approval. Set reconciled=true once a
  partner / connectivity agreement's commercial terms can be referenced. Distribution economics in this
  industry are typically commission-per-booking and commission-per-stayed-night rather than per-call API
  fees.
sources:
  - https://developer.marriott.com/
  - https://www.marriott.com/marriott/aboutmarriott.mi
plans:
  - id: marriott-international-partner
    name: Approved Partner Access
    type: enterprise
    description: Access to the Marriott Developer API portal is granted to approved distribution, loyalty,
      and corporate partners under signed commercial agreements. Commercial terms are bilateral and not
      publicly disclosed.
    entries:
      - label: Partner Connectivity
        description: API access is bundled with the partner's distribution / connectivity agreement;
          no per-API-call fee is published.
        name: partner_connectivity
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://devportalprod.marriott.com
        unit: 1
        price: 'contact partnerships'
        userMultiplied: false
      - label: Booking / Stay Commission
        description: Where applicable, distribution partners pay per-booking or per-stayed-night commission
          settled outside the API surface; rates are negotiated by channel.
        name: booking_commission
        type: metered
        metric: booking
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: 'contact partnerships'
        userMultiplied: false
    elements:
      - name: Marriott Developer API (Property, Availability, Reservation, Loyalty)
      - name: Partner Sandbox / Certification Environment
      - name: Connectivity Support Team
      - name: Distribution / GDS Integration
maintainers:
