specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Marriott International
providerId: marriott-international
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Hospitality
  - Hotels
  - Travel
  - Rate Limiting
description: Marriott International's developer portal is partner-gated; rate limits are configured per
  partner contract and surfaced inside the portal rather than on a public docs page. There are no publicly
  documented per-second or per-minute ceilings for the Marriott Developer API. Real-time availability
  and shopping APIs typically have higher limits than booking and modify endpoints, and look-to-book ratios
  are monitored as part of partner conduct.
notes: |
  No public RPS / RPM numbers published. Set reconciled=true once a partner agreement's documented
  ceilings can be referenced.
sources:
  - https://developer.marriott.com/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Partner-scoped API limit
    scope: partner
    metric: varies
    limit: 'partner-specific; configured in developer portal'
    applies:
      - Marriott Developer API
    notes: Limits are configured per signed partner and visible in the developer portal; consumers should
      consult their connectivity contact for the agreed ceiling.
  - name: Shopping / availability surge
    scope: partner/endpoint
    metric: varies
    limit: 'subject to look-to-book ratio enforcement'
    applies:
      - Marriott Developer API
    notes: Distribution partners are expected to maintain a healthy look-to-book ratio; sustained shopping
      traffic without bookings may trigger commercial review and rate reduction.
policies:
  - name: Backoff Strategy
    description: Clients receiving 429 should implement exponential backoff with jitter and honor Retry-After
      when present.
  - name: Look-to-Book Discipline
    description: Distribution partners are contractually expected to keep look-to-book ratios within agreed
      bounds; abusive shopping traffic without conversion can lead to rate reduction or contract review.
  - name: Idempotency
    description: Use unique idempotency / external transaction IDs on booking and modify operations to
      safely retry across timeouts without creating duplicate reservations.
  - name: Partner-Specific Allowances
    description: Loyalty, corporate, and group partners may receive different limits than leisure / OTA
      partners; consult the contract for the applicable ceiling.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
